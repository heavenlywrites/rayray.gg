<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>rayray :3</title>
<link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Nunito:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--wave:#4a6fa5;--foam:#c8d5e8;--silver:#8a94a6;--ghost:#d4d8e0;--fog:#1a1d25;--ink:#0d0e12}
body{min-height:100vh;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;overflow:hidden}

.bg{position:fixed;border-radius:50%;filter:blur(90px);opacity:.12;animation:drift var(--d,18s) ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(var(--tx,30px),var(--ty,-40px))}}
.pt{position:absolute;border-radius:50%;animation:fl var(--d,5s) ease-in-out infinite alternate;animation-delay:var(--dl,0s)}
@keyframes fl{0%{opacity:.08;transform:translateY(0) scale(.6)}100%{opacity:.3;transform:translateY(-16px) scale(1.2)}}
.waves{position:fixed;bottom:-10px;left:0;right:0;height:160px;pointer-events:none;z-index:1;opacity:.22}
.card{position:relative;z-index:10;width:min(360px,94vw);padding:44px 40px 36px;text-align:center;background:linear-gradient(145deg,rgba(26,29,37,.92),rgba(17,19,24,.96));border:1px solid rgba(138,148,166,.12);border-radius:28px;box-shadow:0 24px 80px rgba(0,0,0,.8),0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(200,213,232,.06);animation:breathe 8s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.rule{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--wave),transparent);margin:0 auto 28px;opacity:.6}
.av-wrap{position:relative;width:90px;height:90px;margin:0 auto 22px}
.av-ring{position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(200,213,232,.15);animation:rot 12s linear infinite}
.av-ring2{position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(200,213,232,.06);animation:rot 20s linear infinite reverse}
@keyframes rot{to{transform:rotate(360deg)}}
.av{width:90px;height:90px;border-radius:50%;overflow:hidden;position:relative;z-index:2;box-shadow:0 0 6px 2px rgba(74,111,165,.4),0 0 14px 3px rgba(74,111,165,.15);animation:glow 3s ease-in-out infinite}
.av img{width:100%;height:100%;object-fit:cover;object-position:center top}
.name{font-family:'Hachi Maru Pop',cursive;font-size:2rem;color:var(--ghost);margin-bottom:4px;display:inline-block;animation:namepulse 2.6s ease-in-out infinite}
@keyframes namepulse{0%,100%{transform:scale(1);text-shadow:0 0 0 rgba(200,213,232,0)}50%{transform:scale(1.04);text-shadow:0 0 14px rgba(200,213,232,.5)}}

.tag{font-size:.72rem;color:var(--silver);letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px}.tag{font-size:.72rem;color:var(--silver);letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(138,148,166,.2),transparent);margin-bottom:24px}
.icons{display:flex;justify-content:center;gap:14px}
.icon-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid rgba(138,148,166,.18);background:rgba(255,255,255,.04);transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s,border-color .25s}
.icon-btn svg{width:22px;height:22px;fill:#b8bfcc;transition:transform .25s}
.icon-btn:hover{transform:translateY(-5px) scale(1.1);border-color:rgba(200,213,232,.35);box-shadow:0 8px 24px rgba(74,111,165,.28)}
.icon-btn:hover svg{transform:scale(1.1)}
.discord{display:flex;align-items:center;gap:13px;margin-top:24px;padding:13px 15px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(138,148,166,.16);text-align:left}
.discord-icon-wrap{width:42px;height:42px;border-radius:50%;overflow:hidden;flex:0 0 auto;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;border:1px solid rgba(200,213,232,.1)}
.discord-icon{width:100%;height:100%;object-fit:cover;display:none}
.discord-info{flex:1;min-width:0;overflow:hidden}
.discord-name{font-size:.78rem;font-weight:700;color:var(--ghost);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.discord-stats{display:flex;flex-wrap:wrap;gap:4px 11px;margin-top:4px;font-size:.64rem;color:var(--silver);letter-spacing:.02em;max-width:100%}
.discord-stat{display:flex;align-items:center;gap:5px;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.discord-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:0 0 auto}
.discord-dot.online{background:#5dd68a;box-shadow:0 0 5px 1px rgba(93,214,138,.55);animation:discordpulse 2.2s ease-in-out infinite}
.discord-dot.members{background:var(--silver)}
@keyframes discordpulse{0%,100%{opacity:1}50%{opacity:.35}}
.discord-join{flex:0 0 auto;font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ghost);background:rgba(255,255,255,.05);border:1px solid rgba(200,213,232,.16);border-radius:10px;padding:8px 13px;text-decoration:none;transition:transform .25s cubic-bezier(.34,1.56,.64,1),background .25s,border-color .25s}
.discord-join:hover{transform:translateY(-3px);background:rgba(74,111,165,.22);border-color:rgba(200,213,232,.35)}
.footer{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:.55rem;color:rgba(138,148,166,.3);letter-spacing:.2em;text-transform:uppercase;z-index:10;white-space:nowrap}
.pop{position:fixed;pointer-events:none;z-index:9999;font-size:13px;color:var(--foam);transform:translate(-50%,-50%);animation:pa .9s forwards}
@keyframes pa{0%{opacity:1;transform:translate(-50%,-50%) scale(.8)}100%{opacity:0;transform:translate(-50%,-170%) scale(.6)}}
</style>
</head>

<script>
const pts=document.getElementById('pts');
const pc=['#4a6fa5','#2e3d5a','#8a94a6','#c8d5e8'];
for(let i=0;i<40;i++){const p=document.createElement('div');p.className='pt';const s=2+Math.random()*5;p.style.cssText=`width:${s}px;height:${s}px;background:${pc[~~(Math.random()*4)]};top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${3+Math.random()*6}s;--dl:${Math.random()*5}s`;pts.appendChild(p)}
const sym=['✦','·','◦','⋆','˚','✧'];
document.addEventListener('click',e=>{const el=document.createElement('div');el.className='pop';el.textContent=sym[~~(Math.random()*6)];el.style.cssText=`left:${e.clientX}px;top:${e.clientY}px`;document.body.appendChild(el);setTimeout(()=>el.remove(),900)});

const DISCORD_INVITE='opp';
async function updateDiscord(){
  try{
    const res=await fetch(`https://discord.com/api/v9/invites/${DISCORD_INVITE}?with_counts=true&with_expiration=true`);
    if(!res.ok) throw new Error('bad response');
    const data=await res.json();
    const guild=data.guild;
    const iconEl=document.getElementById('discordIcon');
    if(guild&&guild.icon){
      iconEl.src=`https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png?size=128`;
      iconEl.style.display='block';
    }
    document.getElementById('discordName').textContent=guild?guild.name:'far far away';
    document.getElementById('discordOnline').textContent=data.approximate_presence_count??'–';
    document.getElementById('discordMembers').textContent=data.approximate_member_count??'–';
  }catch(e){
    document.getElementById('discordName').textContent='far far away';
  }
}
updateDiscord();
