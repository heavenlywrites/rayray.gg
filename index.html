<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✿ find me ✿</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&family=Bubblegum+Sans&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#f0edf2;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;overflow:hidden;}
    :root{--blue:#b8ccd8;--grey:#d4d0cc;--cream:#f0e8e0;--blush:#f0c8d4;--slate:#8fa8be}
    body{cursor:none}
    .cursor{position:fixed;pointer-events:none;z-index:9999;font-size:18px;line-height:1;transform:translate(-50%,-50%);color:#8fa8be;filter:drop-shadow(0 0 4px rgba(143,168,190,.6));transition:transform .12s ease;}

    .blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:.38;pointer-events:none;animation:drift var(--d) ease-in-out infinite alternate}
    @keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(var(--tx,20px),var(--ty,-20px)) scale(1.07)}}
    .dots{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .dot{position:absolute;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate;animation-delay:var(--dl,0s)}
    @keyframes twinkle{from{opacity:.15;transform:scale(.7)}to{opacity:.65;transform:scale(1.3)}}
    .card{position:relative;background:rgba(255,255,255,.78);backdrop-filter:blur(22px);border:1.5px solid rgba(255,255,255,.95);border-radius:36px;padding:50px 56px 46px;text-align:center;width:min(360px,92vw);box-shadow:0 8px 48px rgba(143,168,190,.25),0 2px 12px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,.9);animation:bob 5s ease-in-out infinite;z-index:10}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

    .avatar{width:84px;height:84px;border-radius:50%;overflow:hidden;margin:0 auto 18px;box-shadow:0 4px 24px rgba(143,168,190,.4);animation:pulse 3s ease-in-out infinite;border:3px solid rgba(255,255,255,.9)}
    .avatar img{width:100%;height:100%;object-fit:cover}
    @keyframes pulse{0%,100%{box-shadow:0 4px 24px rgba(143,168,190,.4)}50%{box-shadow:0 4px 40px rgba(240,200,212,.55)}}
    .name{font-family:'Bubblegum Sans',cursive;font-size:2rem;color:var(--slate);margin-bottom:6px}
    .check{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--slate);color:white;border-radius:50%;font-size:.75rem;font-family:'Nunito',sans-serif;font-weight:900;vertical-align:middle;margin-left:4px;margin-bottom:3px;box-shadow:0 2px 8px rgba(143,168,190,.4)}
    .tagline{font-size:.76rem;color:#aabbc8;letter-spacing:2px;text-transform:uppercase;margin-bottom:36px}
    .icons{display:flex;justify-content:center;gap:16px}
    .icon-btn{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s ease}
    .icon-btn svg{width:25px;height:25px}
    .btn-ig{background:#e8d4d8;box-shadow:0 4px 16px rgba(240,200,212,.4)}
    .btn-ig svg{fill:#a06878}
    .btn-ig:hover{transform:translateY(-6px) rotate(-5deg) scale(1.12);box-shadow:0 12px 28px rgba(240,200,212,.55)}
    .btn-tw{background:#c8d8e8;box-shadow:0 4px 16px rgba(184,204,216,.4)}
    .btn-tw svg{fill:#5a88a8}
    .btn-tw:hover{transform:translateY(-6px) rotate(5deg) scale(1.12);box-shadow:0 12px 28px rgba(184,204,216,.55)}
    .btn-tt{background:#d4dce4;box-shadow:0 4px 16px rgba(212,220,228,.4)}
    .btn-tt svg{fill:#6888a0}
    .btn-tt:hover{transform:translateY(-6px) rotate(-4deg) scale(1.12);box-shadow:0 12px 28px rgba(212,220,228,.55)}
    .btn-tv{background:#ddd4e8;box-shadow:0 4px 16px rgba(217,212,232,.4)}
    .btn-tv svg{fill:#9070b8}
    .btn-tv:hover{transform:translateY(-6px) rotate(4deg) scale(1.12);box-shadow:0 12px 28px rgba(217,212,232,.55)}
    .footer{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-size:.68rem;color:#b8c8d0;letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
    .pop{position:fixed;pointer-events:none;z-index:999;font-size:1.2rem;transform:translate(-50%,-50%);animation:pop-rise .9s ease-out forwards}
    @keyframes pop-rise{from{opacity:1;transform:translate(-50%,-50%) scale(.5)}to{opacity:0;transform:translate(-50%,-200%) scale(1.4)}}
  </style>
</head>
